name: Render Backend Keep-Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping backend
        run: |
          echo "Pinging at $(date -u)"
          curl -fsS --max-time 60 "https://uos-archive-backend.onrender.com/api/health"
          echo "Done"
